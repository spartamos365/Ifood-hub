# ============================================================
# iFoodHub — Deploy & Infraestrutura
# Docker Compose + AWS/GCP + Env config
# ============================================================

# ─── docker-compose.yml ──────────────────────────────────────
version: '3.9'

services:
  # Backend Node.js
  backend:
    build: ./backend
    image: ifoodhub/backend:latest
    container_name: ifoodhub-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - IFOOD_ENV=${IFOOD_ENV}
      - IFOOD_WEBHOOK_SECRET=${IFOOD_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - ifoodhub-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  # Frontend React
  frontend:
    build: ./frontend
    image: ifoodhub/frontend:latest
    container_name: ifoodhub-web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:3001
      - REACT_APP_WS_URL=ws://backend:3001
    networks:
      - ifoodhub-net

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ifoodhub-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ifoodhub
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - ifoodhub-net

  # Redis (cache + filas Bull)
  redis:
    image: redis:7-alpine
    container_name: ifoodhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ifoodhub-net

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ifoodhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - ifoodhub-net

volumes:
  postgres_data:
  redis_data:

networks:
  ifoodhub-net:
    driver: bridge


---
# ─── .env.example ────────────────────────────────────────────
# Copie para .env e preencha os valores reais

# App
NODE_ENV=production
PORT=3001
FRONTEND_URL=https://app.ifoodhub.com

# Database PostgreSQL
DATABASE_URL=postgresql://ifoodhub:SENHA_SEGURA@localhost:5432/ifoodhub
DB_USER=ifoodhub
DB_PASSWORD=SENHA_SEGURA

# Redis
REDIS_URL=redis://localhost:6379
REDIS_PASSWORD=SENHA_REDIS

# JWT
JWT_SECRET=sua-chave-jwt-super-segura-minimo-32-caracteres

# iFood API
IFOOD_ENV=sandbox            # sandbox | production
IFOOD_WEBHOOK_SECRET=seu-webhook-secret-ifood

# Criptografia (dados sensíveis)
ENCRYPTION_KEY=sua-chave-aes-256-bits-32-chars

# WhatsApp (Evolution API ou similar)
WHATSAPP_API_URL=https://api.whatsapp.local
WHATSAPP_API_KEY=sua-api-key


---
# ─── nginx.conf ──────────────────────────────────────────────
events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name app.ifoodhub.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name app.ifoodhub.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Frontend React
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        # Backend API
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Webhooks iFood (sem rate limit)
        location /webhooks {
            proxy_pass http://backend;
            proxy_read_timeout 30s;
        }

        # Socket.IO
        location /socket.io {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}


---
# ─── Dockerfile (Backend) ─────────────────────────────────────
# backend/Dockerfile
FROM node:20-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production

FROM node:20-alpine
WORKDIR /app
COPY --from=builder /app/node_modules ./node_modules
COPY . .

RUN addgroup -S appgroup && adduser -S appuser -G appgroup
USER appuser

EXPOSE 3001
HEALTHCHECK --interval=30s --timeout=5s CMD wget -qO- http://localhost:3001/health || exit 1
CMD ["node", "src/index.js"]


---
# ─── Dockerfile (Frontend) ────────────────────────────────────
# frontend/Dockerfile
FROM node:20-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci
COPY . .
RUN npm run build

FROM nginx:alpine
COPY --from=builder /app/build /usr/share/nginx/html
COPY nginx-spa.conf /etc/nginx/conf.d/default.conf
EXPOSE 80
CMD ["nginx", "-g", "daemon off;"]


---
# ─── API Documentation (OpenAPI 3.0) ─────────────────────────
# Endpoints principais da API iFoodHub

openapi: 3.0.0
info:
  title: iFoodHub API
  version: 2.1.0
  description: API de integração SaaS com o iFood

servers:
  - url: https://api.ifoodhub.com/api
    description: Produção
  - url: https://sandbox.ifoodhub.com/api
    description: Sandbox

paths:
  /auth/login:
    post:
      summary: Autenticação JWT
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Token JWT + dados do usuário

  /auth/ifood/connect:
    post:
      summary: Conectar loja ao iFood via OAuth2
      security: [bearerAuth: []]
      requestBody:
        content:
          application/json:
            schema:
              properties:
                clientId: { type: string }
                clientSecret: { type: string }
                merchantId: { type: string }
                storeId: { type: string, format: uuid }

  /orders:
    get:
      summary: Listar pedidos
      security: [bearerAuth: []]
      parameters:
        - name: storeId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema:
            enum: [pending, confirmed, preparing, delivering, delivered, cancelled]
        - name: limit
          in: query
          schema: { type: integer, default: 50 }

  /orders/{id}/status:
    patch:
      summary: Atualizar status do pedido (sincroniza com iFood)
      security: [bearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              properties:
                status:
                  enum: [confirmed, preparing, delivering, delivered, cancelled]
                storeId: { type: string, format: uuid }

  /products:
    get:
      summary: Listar produtos do catálogo
      security: [bearerAuth: []]
    post:
      summary: Cadastrar novo produto
      security: [bearerAuth: []]

  /products/{id}/sync:
    post:
      summary: Sincronizar produto com o catálogo iFood
      security: [bearerAuth: []]

  /products/bulk-price:
    patch:
      summary: Atualização de preço em lote
      security: [bearerAuth: []]

  /stores:
    get:
      summary: Listar todas as lojas do tenant
      security: [bearerAuth: []]

  /inventory:
    get:
      summary: Consultar estoque
      security: [bearerAuth: []]
    patch:
      summary: Ajustar estoque manualmente
      security: [bearerAuth: []]

  /automation:
    get:
      summary: Listar regras de automação
      security: [bearerAuth: []]
    patch:
      summary: Ativar/desativar regra de automação
      security: [bearerAuth: []]

  /reports/summary:
    get:
      summary: Relatório resumo (pedidos, receita, ticket médio)
      security: [bearerAuth: []]

webhooks:
  ifoodEvent:
    post:
      summary: Recebe eventos de pedidos do iFood
      description: |
        Configure este endpoint no painel iFood Developer.
        URL: https://api.ifoodhub.com/webhooks/ifood/events
        Autenticação: HMAC SHA256 via header X-iFood-Signature
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                properties:
                  id: { type: string }
                  code: { type: string, enum: [PLACED, CONFIRMED, CANCELLATION_REQUESTED, CONCLUDED] }
                  orderId: { type: string }
                  merchantId: { type: string }
                  createdAt: { type: string, format: date-time }


---
# ─── Checklist de Homologação iFood ──────────────────────────
# Siga estes passos para homologar na plataforma iFood Developer

CHECKLIST HOMOLOGAÇÃO IFOOD:

[ ] 1. Criar conta em: https://developer.ifood.com.br
[ ] 2. Registrar aplicação e obter Client ID + Secret
[ ] 3. Configurar Webhook URL: https://api.ifoodhub.com/webhooks/ifood/events
[ ] 4. Testar em Sandbox:
    - Simular pedido PLACED
    - Confirmar via API (POST /statuses/confirmed)
    - Simular CANCELLATION_REQUESTED
    - Verificar polling 30s funcionando
[ ] 5. Testar fluxo completo de catálogo:
    - Criar produto
    - Atualizar preço
    - Alterar status de disponibilidade
    - Publicar catálogo
[ ] 6. Validar idempotência (eventos duplicados)
[ ] 7. Validar renovação automática de token OAuth2
[ ] 8. Submeter para revisão no portal iFood Developer
[ ] 9. Aprovação e chave de produção

ENDPOINTS SANDBOX IFOOD:
  Base URL: https://merchant-api.ifood.com.br/sandbox
  Auth:     https://merchant-api.ifood.com.br/authentication/v1.0/oauth/token
  Orders:   /order/v1.0/events:polling
  Catalog:  /catalog/v2.0/merchants/{merchantId}/catalog
  Merchant: /merchant/v1.0/merchants/{merchantId}/status
